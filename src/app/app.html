<div class="app-layout" *ngIf="authService.isAuthenticated(); else authLayout">
  <!-- Left Side Sidebar -->
  <aside class="app-sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">🛡️</span>
      <div class="sidebar-brand">
        <h2>Enterprise Panel</h2>
        <span class="brand-version">v1.0.0 (Router)</span>
      </div>
    </div>

    <!-- Navigation links -->
    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li>
          <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
            <span class="nav-icon">📈</span> Overview
          </a>
        </li>
        
        <li>
          <a 
            routerLink="/users" 
            routerLinkActive="active" 
            class="nav-item" 
            [ngClass]="{'disabled-nav-item': !authService.isAdmin()}"
            [title]="authService.isAdmin() ? 'Manage user directory' : 'Admin privilege required'"
          >
            <span class="nav-icon">👥</span> User Admin <span class="lock-badge" *ngIf="!authService.isAdmin()">🔒</span>
          </a>
        </li>

        <li>
          <a 
            routerLink="/logs" 
            routerLinkActive="active" 
            class="nav-item" 
            [ngClass]="{'disabled-nav-item': !authService.isAdmin()}"
            [title]="authService.isAdmin() ? 'View security logs' : 'Admin privilege required'"
          >
            <span class="nav-icon">📋</span> Audit Logs <span class="lock-badge" *ngIf="!authService.isAdmin()">🔒</span>
          </a>
        </li>

        <li>
          <a 
            routerLink="/settings" 
            routerLinkActive="active" 
            class="nav-item" 
            [ngClass]="{'disabled-nav-item': !authService.isAdmin()}"
            [title]="authService.isAdmin() ? 'Configure settings' : 'Admin privilege required'"
          >
            <span class="nav-icon">⚙️</span> Settings <span class="lock-badge" *ngIf="!authService.isAdmin()">🔒</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- User profiles state footer -->
    <div class="sidebar-footer">
      <div class="user-info-card">
        <span class="user-avatar">👤</span>
        <div class="user-details">
          <strong class="user-name">{{ authService.username() }}</strong>
          <span class="role-badge" [ngClass]="authService.activeRole()?.toLowerCase()">
            {{ authService.activeRole() }}
          </span>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()">
        🚪 Sign Out
      </button>
    </div>
  </aside>

  <!-- Right Main Panel -->
  <main class="app-main">
    <header class="main-header">
      <!-- Breadcrumbs Component -->
      <app-breadcrumbs></app-breadcrumbs>
      <div class="header-status">
        <span class="status-dot online"></span>
        <span class="status-text">Production Server Online</span>
      </div>
    </header>
    
    <!-- Router workspace content wrapper -->
    <section class="main-content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

<ng-template #authLayout>
  <router-outlet></router-outlet>
</ng-template>
