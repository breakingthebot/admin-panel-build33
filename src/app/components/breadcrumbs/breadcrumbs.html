<nav class="breadcrumbs-nav" aria-label="breadcrumb" *ngIf="breadcrumbs().length > 0">
  <ol class="breadcrumbs-list">
    <li class="breadcrumb-item">
      <a routerLink="/dashboard" class="breadcrumb-link">🏠 Home</a>
    </li>
    
    <li class="breadcrumb-item-separator">/</li>

    <li class="breadcrumb-item" *ngFor="let item of breadcrumbs(); let last = last">
      <a *ngIf="!last" [routerLink]="item.url" class="breadcrumb-link">{{ item.label }}</a>
      <span *ngIf="last" class="breadcrumb-active" aria-current="page">{{ item.label }}</span>
    </li>
  </ol>
</nav>
